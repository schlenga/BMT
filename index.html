<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMT — Business Model Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── Warm & Friendly Design System ── */
:root {
  --bg: #faf7f2;
  --bg2: #f3ede4;
  --surface: #ffffff;
  --surface2: #fef9f3;
  --text: #2d2a26;
  --text2: #6b6560;
  --text3: #9e9590;
  --accent: #e07c4a;
  --accent2: #c5673a;
  --accent-light: #fef3e2;
  --green: #4caf7d;
  --green-light: #e8f5ed;
  --blue: #5b9bd5;
  --blue-light: #e3f0fa;
  --red: #d4605a;
  --red-light: #fce8e7;
  --amber: #e5a849;
  --amber-light: #fef6e0;
  --purple: #9b7ec8;
  --purple-light: #f3eefa;
  --border: #e8e0d6;
  --border2: #d9cfc3;
  --shadow: rgba(45, 42, 38, 0.06);
  --shadow2: rgba(45, 42, 38, 0.12);
  --radius: 14px;
  --radius-sm: 10px;
  --radius-xs: 7px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  font-size: 14px;
  line-height: 1.6;
  min-height: 100vh;
}

/* ── Navigation ── */
.main-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 24px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  box-shadow: 0 1px 4px var(--shadow);
  position: sticky;
  top: 0;
  z-index: 100;
}
.nav-brand {
  font-size: 22px;
  font-weight: 700;
  color: var(--accent);
  cursor: pointer;
  letter-spacing: -0.5px;
}
.nav-links { display: flex; gap: 4px; }
.nav-link {
  padding: 8px 16px;
  text-decoration: none;
  color: var(--text2);
  font-size: 13px;
  font-weight: 500;
  border-radius: var(--radius-xs);
  transition: all 0.15s;
}
.nav-link:hover { background: var(--bg2); color: var(--text); }
.nav-link.active { background: var(--accent-light); color: var(--accent); }

/* ── Content ── */
.content { max-width: 1100px; margin: 0 auto; padding: 24px 20px 80px; }

/* ── Page titles ── */
.page-title {
  font-size: 26px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 6px;
  letter-spacing: -0.5px;
}
.page-subtitle {
  font-size: 14px;
  color: var(--text3);
  margin-bottom: 20px;
}

/* ── Wizard ── */
.wizard-page { max-width: 600px; margin: 0 auto; padding-top: 32px; }
.wiz-progress {
  height: 6px;
  background: var(--bg2);
  border-radius: 3px;
  margin-bottom: 8px;
  overflow: hidden;
}
.wiz-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--amber));
  border-radius: 3px;
  transition: width 0.3s ease;
}
.wiz-step-count {
  font-size: 12px;
  color: var(--text3);
  margin-bottom: 24px;
}
.wiz-title {
  font-size: 28px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 8px;
  letter-spacing: -0.5px;
}
.wiz-subtitle {
  font-size: 18px;
  font-weight: 600;
  color: var(--text);
  margin: 24px 0 8px;
}
.wiz-hint {
  font-size: 14px;
  color: var(--text2);
  margin-bottom: 16px;
  line-height: 1.5;
}
.wiz-textarea {
  width: 100%;
  min-height: 100px;
  padding: 14px 16px;
  font-family: inherit;
  font-size: 15px;
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface);
  color: var(--text);
  resize: vertical;
  outline: none;
  transition: border-color 0.15s;
  line-height: 1.5;
}
.wiz-textarea:focus { border-color: var(--accent); }
.wiz-input {
  width: 100%;
  padding: 12px 16px;
  font-family: inherit;
  font-size: 15px;
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface);
  color: var(--text);
  outline: none;
  transition: border-color 0.15s;
}
.wiz-input:focus { border-color: var(--accent); }
.wiz-add-input { margin-top: 12px; font-size: 13px; padding: 10px 14px; }
.wiz-insight {
  margin-top: 12px;
  padding: 12px 16px;
  background: var(--green-light);
  color: var(--green);
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 500;
}

/* Chips */
.wiz-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 4px;
}
.wiz-chip {
  display: inline-block;
  padding: 8px 14px;
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: 20px;
  font-size: 13px;
  color: var(--text2);
  cursor: pointer;
  transition: all 0.15s;
  user-select: none;
}
.wiz-chip:hover { border-color: var(--accent); color: var(--text); }
.wiz-chip.active {
  background: var(--accent-light);
  border-color: var(--accent);
  color: var(--accent2);
  font-weight: 500;
}
.wiz-selected { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 6px; }
.wiz-empty { color: var(--text3); font-style: italic; font-size: 13px; }

/* Wizard slider */
.wiz-slider-wrap { margin: 16px 0 8px; }
.wiz-range {
  -webkit-appearance: none;
  width: 100%;
  height: 8px;
  background: linear-gradient(90deg, var(--green), var(--amber), var(--red));
  border-radius: 4px;
  outline: none;
  cursor: pointer;
}
.wiz-range::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: var(--surface);
  border: 3px solid var(--accent);
  cursor: pointer;
  box-shadow: 0 2px 6px var(--shadow2);
}
.wiz-range-val {
  text-align: center;
  font-size: 32px;
  font-weight: 700;
  color: var(--accent);
  margin: 12px 0;
}
.wiz-range-labels {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: var(--text3);
}

/* Wizard nav */
.wiz-nav {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  margin-top: 32px;
  padding-top: 24px;
  border-top: 1px solid var(--border);
}
.wiz-btn {
  padding: 12px 28px;
  font-family: inherit;
  font-size: 14px;
  font-weight: 600;
  border: none;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.15s;
}
.wiz-btn-back {
  background: var(--bg2);
  color: var(--text2);
}
.wiz-btn-back:hover { background: var(--border); }
.wiz-btn-primary {
  background: var(--accent);
  color: #fff;
  margin-left: auto;
}
.wiz-btn-primary:hover { background: var(--accent2); }

/* Wizard summary */
.wiz-summary-biz {
  font-size: 18px;
  margin-bottom: 4px;
}
.wiz-summary-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin: 16px 0;
}
.wiz-summary-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px;
}
.wiz-summary-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text3);
  margin-bottom: 6px;
}
.wiz-summary-items { display: flex; flex-wrap: wrap; gap: 4px; }
.wiz-hyp-preview { display: flex; flex-direction: column; gap: 6px; }
.wiz-hyp-card {
  padding: 10px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-xs);
  font-size: 13px;
  line-height: 1.4;
}
.wiz-hyp-cat {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 10px;
  font-weight: 600;
  color: #fff;
  text-transform: uppercase;
  letter-spacing: 0.3px;
  margin-right: 6px;
}

/* ── Business Model Canvas ── */
.canvas-header { margin-bottom: 20px; }
.bmc-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr 1fr 1fr;
  grid-template-rows: auto auto;
  gap: 2px;
  background: var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: 0 2px 8px var(--shadow);
}
.bmc-cell {
  background: var(--surface);
  padding: 12px;
  min-height: 140px;
}
.bmc-tall { grid-row: span 2; }
.bmc-cell-split {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.bmc-half { min-height: 69px; }
.bmc-wide { grid-column: span 2; min-height: 100px; }
.bmc-costs { grid-column: 1 / 3; }
.bmc-revenue { grid-column: 3 / 6; }

.bmc-cell-header {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 8px;
}
.bmc-icon { font-size: 14px; }
.bmc-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text3);
}
.bmc-hyp-badge {
  font-size: 9px;
  font-weight: 600;
  background: var(--blue-light);
  color: var(--blue);
  padding: 1px 6px;
  border-radius: 8px;
  margin-left: auto;
}
.bmc-items { display: flex; flex-direction: column; gap: 4px; }
.bmc-item {
  padding: 6px 10px;
  background: var(--bg);
  border-radius: var(--radius-xs);
  font-size: 12px;
  cursor: pointer;
  transition: all 0.12s;
  border: 1px solid transparent;
}
.bmc-item:hover { border-color: var(--accent); }
.bmc-item.status-validated { border-left: 3px solid var(--green); }
.bmc-item.status-testing { border-left: 3px solid var(--blue); }
.bmc-item.status-risk { border-left: 3px solid var(--red); }
.bmc-item.editing {
  display: flex;
  gap: 4px;
  align-items: center;
  background: var(--surface);
  border: 2px solid var(--accent);
}
.bmc-edit-input {
  flex: 1;
  border: none;
  outline: none;
  font-family: inherit;
  font-size: 12px;
  background: transparent;
  color: var(--text);
}
.bmc-item-btn {
  width: 24px;
  height: 24px;
  border: none;
  border-radius: 50%;
  cursor: pointer;
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.1s;
}
.bmc-save { background: var(--green-light); color: var(--green); }
.bmc-save:hover { background: var(--green); color: #fff; }
.bmc-delete { background: var(--red-light); color: var(--red); }
.bmc-delete:hover { background: var(--red); color: #fff; }
.bmc-add {
  margin-top: 8px;
  padding: 4px 10px;
  border: 1px dashed var(--border2);
  border-radius: var(--radius-xs);
  background: transparent;
  color: var(--text3);
  font-family: inherit;
  font-size: 11px;
  cursor: pointer;
  width: 100%;
  transition: all 0.12s;
}
.bmc-add:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

/* ── Tracker ── */
.tracker-header { margin-bottom: 16px; }
.tracker-summary {
  display: flex;
  gap: 2px;
  background: var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 16px;
  box-shadow: 0 2px 6px var(--shadow);
}
.summary-card {
  flex: 1;
  padding: 16px 12px;
  text-align: center;
  background: var(--surface);
}
.summary-count {
  font-size: 28px;
  font-weight: 700;
  line-height: 1;
  margin-bottom: 4px;
}
.summary-label {
  font-size: 11px;
  color: var(--text3);
  font-weight: 500;
}

.lean-tip {
  padding: 12px 16px;
  background: var(--amber-light);
  border: 1px solid #f0d89a;
  border-radius: var(--radius-sm);
  font-size: 13px;
  color: #8b6d23;
  margin-bottom: 16px;
  line-height: 1.5;
}
.lean-tip a { color: var(--accent); }

.tracker-filters {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 16px;
}
.filter-btn {
  padding: 6px 14px;
  border: 1px solid var(--border);
  border-radius: 20px;
  background: var(--surface);
  color: var(--text2);
  font-family: inherit;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.12s;
}
.filter-btn:hover { border-color: var(--accent); color: var(--text); }
.filter-btn.active {
  background: var(--accent-light);
  border-color: var(--accent);
  color: var(--accent2);
  font-weight: 600;
}

.tracker-actions { margin-bottom: 16px; }
.tracker-empty {
  text-align: center;
  padding: 40px 20px;
  color: var(--text3);
}
.tracker-empty a { color: var(--accent); }
.tracker-cards { display: flex; flex-direction: column; gap: 12px; }

/* Hypothesis cards */
.hyp-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  box-shadow: 0 1px 4px var(--shadow);
  transition: box-shadow 0.15s;
}
.hyp-card:hover { box-shadow: 0 2px 8px var(--shadow2); }
.hyp-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
  flex-wrap: wrap;
}
.hyp-cat {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 3px 10px;
  border-radius: 12px;
}
.hyp-priority {
  font-size: 10px;
  font-weight: 700;
  color: var(--red);
  background: var(--red-light);
  padding: 3px 10px;
  border-radius: 12px;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}
.hyp-status {
  font-size: 10px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 12px;
  margin-left: auto;
}
.hyp-statement {
  font-size: 15px;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 10px;
  line-height: 1.4;
}
.hyp-metric {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
}
.hyp-metric-label {
  font-size: 12px;
  color: var(--text3);
}
.hyp-metric-val {
  font-size: 13px;
  color: var(--text2);
}
.hyp-progress-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}
.hyp-progress-bar {
  flex: 1;
  height: 8px;
  background: var(--bg2);
  border-radius: 4px;
  overflow: hidden;
}
.hyp-progress-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.3s;
}
.hyp-progress-pct {
  font-size: 12px;
  font-weight: 600;
  color: var(--text2);
  min-width: 36px;
  text-align: right;
}
.hyp-sparkline { margin: 8px 0; }
.sparkline { width: 100%; max-width: 300px; }
.hyp-timeframe {
  font-size: 11px;
  color: var(--text3);
  margin-bottom: 8px;
}

/* Logging form */
.hyp-log-form {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin: 12px 0;
  padding: 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
}
.log-date, .log-value, .log-note {
  padding: 8px 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius-xs);
  font-family: inherit;
  font-size: 13px;
  outline: none;
  background: var(--surface);
}
.log-note { grid-column: span 2; }
.log-date:focus, .log-value:focus, .log-note:focus { border-color: var(--accent); }
.log-btns { grid-column: span 2; display: flex; gap: 8px; }

/* Data history */
.hyp-history {
  margin: 8px 0;
  font-size: 12px;
}
.hyp-history summary {
  cursor: pointer;
  color: var(--text3);
  font-size: 11px;
}
.hyp-data-table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 6px;
}
.hyp-data-table th, .hyp-data-table td {
  padding: 4px 8px;
  text-align: left;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
}
.hyp-data-table th {
  font-weight: 600;
  color: var(--text3);
  font-size: 10px;
  text-transform: uppercase;
}

/* Actions */
.hyp-actions {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
}
.hyp-status-select {
  padding: 6px 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius-xs);
  font-family: inherit;
  font-size: 12px;
  background: var(--surface);
  cursor: pointer;
  outline: none;
}
.btn-delete-hyp {
  margin-left: auto;
  background: none;
  border: none;
  cursor: pointer;
  font-size: 16px;
  opacity: 0.4;
  transition: opacity 0.1s;
}
.btn-delete-hyp:hover { opacity: 1; }

/* ── Shared Buttons ── */
.btn-warm {
  padding: 8px 18px;
  font-family: inherit;
  font-size: 13px;
  font-weight: 500;
  border: 1px solid var(--border);
  border-radius: var(--radius-xs);
  background: var(--surface);
  color: var(--text);
  cursor: pointer;
  transition: all 0.12s;
}
.btn-warm:hover { background: var(--bg2); border-color: var(--border2); }
.btn-add-hyp {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.btn-add-hyp:hover { background: var(--accent2); }
.btn-danger {
  color: var(--red);
  border-color: var(--red);
}
.btn-danger:hover { background: var(--red-light); }

/* ── Settings ── */
.settings-section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 16px;
  box-shadow: 0 1px 4px var(--shadow);
}
.settings-section h3 {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 8px;
}
.settings-info p { font-size: 14px; color: var(--text2); margin-bottom: 4px; }
.settings-btns { display: flex; gap: 8px; flex-wrap: wrap; }
.settings-danger { border-color: var(--red-light); }
.settings-danger h3 { color: var(--red); }

.stage-selector { display: flex; gap: 8px; flex-wrap: wrap; }
.stage-card {
  flex: 1;
  min-width: 160px;
  padding: 14px;
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.15s;
}
.stage-card:hover { border-color: var(--accent); }
.stage-card.active {
  border-color: var(--accent);
  background: var(--accent-light);
}
.stage-label { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
.stage-desc { font-size: 12px; color: var(--text2); line-height: 1.4; }

/* ── Responsive ── */
@media (max-width: 768px) {
  .bmc-grid {
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto;
  }
  .bmc-tall { grid-row: span 1; }
  .bmc-wide { grid-column: span 2; }
  .bmc-costs { grid-column: span 2; }
  .bmc-revenue { grid-column: span 2; }
  .bmc-cell-split { gap: 2px; }

  .tracker-summary { flex-wrap: wrap; }
  .summary-card { min-width: 48%; }

  .wiz-summary-grid { grid-template-columns: 1fr; }

  .hyp-log-form { grid-template-columns: 1fr; }
  .log-note { grid-column: span 1; }
  .log-btns { grid-column: span 1; }

  .main-nav { padding: 12px 16px; }
  .content { padding: 16px 12px 60px; }
  .page-title { font-size: 22px; }
}

@media (max-width: 480px) {
  .bmc-grid { grid-template-columns: 1fr; }
  .bmc-wide { grid-column: span 1; }
  .bmc-costs { grid-column: span 1; }
  .bmc-revenue { grid-column: span 1; }

  .stage-selector { flex-direction: column; }
  .stage-card { min-width: 100%; }
}
</style>
</head>
<body>
<div id="app"></div>
<script src="store.js"></script>
<script src="wizard.js"></script>
<script src="canvas.js"></script>
<script src="tracker.js"></script>
<script src="app.js"></script>
</body>
</html>
