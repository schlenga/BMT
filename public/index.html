<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>OxO Simulator</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#fafafa;--sf:#fff;--sf2:#f5f5f7;--sf3:#e8e8ed;--tx:#1d1d1f;--tx2:#6e6e73;--tx3:#86868b;--tc:#0071e3;--tc2:#147ce5;--sg:#34c759;--sg2:#248a3d;--gd:#ff9f0a;--gd2:#c93400;--dn:#ff3b30;--bd:#d2d2d7;--bd2:#e5e5ea;--purple:#af52de}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--tx);-webkit-font-smoothing:antialiased;font-size:13px;line-height:1.5}::selection{background:var(--tc);color:#fff}
.page{max-width:1400px;margin:0 auto;padding:0 32px 120px}
.hero{padding:40px 0 28px;border-bottom:1px solid var(--bd2)}.brand{display:flex;align-items:flex-end;justify-content:space-between}
.logo{font-family:'Instrument Serif',serif;font-size:52px;font-weight:400;letter-spacing:-3px;line-height:.85;color:var(--tx)}.logo em{color:var(--tc);font-style:italic}
.bsub{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--tx3);margin-top:4px}
.scbar{display:flex;align-items:center;gap:16px;padding:20px 0 16px}.sclbl{font-size:11px;font-weight:500;color:var(--tx3)}
.scs{display:flex;background:var(--sf2);border-radius:8px;padding:2px;gap:2px}.sc{padding:7px 18px;cursor:pointer;font-size:12px;font-weight:500;color:var(--tx3);border-radius:6px;user-select:none;transition:all .15s}.sc:hover{color:var(--tx)}.sc.a{background:var(--sf);color:var(--tx);box-shadow:0 1px 3px rgba(0,0,0,.08)}
.kpi-strip{display:flex;gap:1px;background:var(--bd2);border-radius:12px;overflow:hidden;margin-bottom:20px;box-shadow:0 1px 3px rgba(0,0,0,.04)}.kpi{flex:1;padding:14px 8px;text-align:center;background:var(--sf)}
.kl{font-size:8px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--tx3);margin-bottom:4px}.kv{font-family:'Instrument Serif',serif;font-size:24px;line-height:1}.ks{font-size:9px;color:var(--tx3);margin-top:2px}
.kv.green{color:var(--sg2)}.kv.red{color:var(--dn)}.kv.gold{color:var(--gd2)}.kv.blue{color:var(--tc)}.kv.purple{color:var(--purple)}
.sec{padding:32px 0 0}.shd{display:flex;align-items:baseline;gap:10px;margin-bottom:16px}.sn{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--tc);font-weight:500}.stt{font-family:'Instrument Serif',serif;font-size:26px;letter-spacing:-.5px;color:var(--tx)}.sline{flex:1;height:1px;background:var(--bd2)}
.cc{background:var(--sf);border:1px solid var(--bd2);border-radius:12px;padding:24px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.04)}.card{background:var(--sf);border:1px solid var(--bd2);border-radius:10px;padding:16px;margin-bottom:8px}.card-l{font-size:9px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--tx3);margin-bottom:8px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.yt{width:100%;border-collapse:collapse}.yt th{font-size:8px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;color:var(--tx3);text-align:left;padding:5px 6px;border-bottom:1px solid var(--bd2);white-space:nowrap}.yt th.yr{text-align:right;color:var(--tc)}.yt td{padding:4px 6px;border-bottom:1px solid var(--bd2);font-size:11px;color:var(--tx2);white-space:nowrap}.yt td:first-child{color:var(--tx)}.yt tr:last-child td{border-bottom:none}.yt td.n{font-family:'JetBrains Mono',monospace;text-align:right;font-size:9px}.yt td.p{color:var(--sg2)}.yt td.ng{color:var(--dn)}.yt tr.tot{border-top:2px solid var(--bd)}.yt tr.tot td{font-weight:600;color:var(--tx)}.yt tr.sp td{padding:2px;border:none}
.sg{margin-bottom:12px}.sl{display:flex;justify-content:space-between;margin-bottom:3px}.snm{font-size:11px;color:var(--tx2)}.svl{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--tc);font-weight:500}
input[type=range]{-webkit-appearance:none;width:100%;height:3px;background:var(--bd2);border-radius:2px;outline:none;cursor:pointer}input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--tc);cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.field{margin-bottom:6px}.field label{font-size:9px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;color:var(--tx3);display:block;margin-bottom:3px}.field input,.field select{width:100%;padding:6px 8px;font-family:Inter,sans-serif;font-size:12px;background:var(--sf2);border:1px solid var(--bd2);border-radius:6px;color:var(--tx);outline:none}.field input:focus,.field select:focus{border-color:var(--tc);box-shadow:0 0 0 3px rgba(0,113,227,.1)}
.ptog{display:flex;background:var(--sf2);border-radius:8px;padding:2px;margin-bottom:10px}.pto{flex:1;padding:8px;cursor:pointer;text-align:center;border-radius:6px;user-select:none;transition:all .12s}.pto:hover{background:var(--sf)}.pto.a{background:var(--tc);color:#fff;box-shadow:0 1px 3px rgba(0,113,227,.3)}.pto-t{font-size:12px;font-weight:600}.pto-d{font-size:9px;color:var(--tx3);margin-top:1px}.pto.a .pto-d{color:rgba(255,255,255,.6)}
.arch{background:var(--sf);border:1px solid var(--bd2);border-radius:10px;padding:12px 14px;cursor:pointer;margin-bottom:6px;transition:all .12s}.arch:hover{border-color:var(--tc);box-shadow:0 0 0 3px rgba(0,113,227,.08)}.arch.sel{border-color:var(--tc);box-shadow:0 0 0 3px rgba(0,113,227,.12)}
.arch-nm{font-size:14px;font-weight:500}.arch-meta{display:flex;gap:8px;font-size:10px;color:var(--tx3);margin-top:3px;flex-wrap:wrap;align-items:center}
.tshirt{font-family:'JetBrains Mono',monospace;font-size:9px;padding:2px 6px;font-weight:600;border-radius:4px}.tshirt.S{background:#e8f5e9;color:#2e7d32}.tshirt.M{background:#fff3e0;color:#e65100}.tshirt.L{background:#fce4ec;color:#c62828}
.star{cursor:pointer;font-size:14px;opacity:.3;transition:opacity .1s}.star.on{opacity:1}
.badge{font-size:9px;font-weight:500;padding:2px 6px;background:var(--sf2);border-radius:4px;color:var(--tx3)}
.btn{padding:6px 14px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid var(--bd);border-radius:6px;background:var(--sf);color:var(--tx);transition:all .1s}.btn:hover{background:var(--sf2)}.btn.pr{background:var(--tc);color:#fff;border-color:var(--tc)}.btn.dn{border-color:var(--dn);color:var(--dn)}.btn.dn:hover{background:#fff5f5}
.ptgl{display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:12px 16px;background:var(--sf);border:1px solid var(--bd2);border-radius:10px;margin-bottom:3px;user-select:none}.ptgl:hover{background:var(--sf2)}.ptgl .pt-t{font-size:14px;font-weight:500}.ptgl .pt-s{font-size:11px;color:var(--tx3)}.ptgl .pt-a{font-size:10px;color:var(--tx3);transition:transform .1s}.ptgl.open .pt-a{transform:rotate(90deg)}
.pbdy{background:var(--sf);border:1px solid var(--bd2);border-top:none;border-radius:0 0 10px 10px;padding:16px;margin-bottom:12px;display:none}.pbdy.open{display:block}
.note{font-size:10px;color:var(--tx3);line-height:1.4;margin-top:4px}.divider{height:1px;background:var(--bd2);margin:12px 0}
.yboard{border:1px solid var(--bd2);border-radius:10px;margin-bottom:8px;overflow:hidden}.yboard-head{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--sf2);cursor:pointer;user-select:none}.yboard-head:hover{background:var(--sf3)}.yboard-yr{font-family:'Instrument Serif',serif;font-size:20px}.yboard-sum{font-size:11px;color:var(--tx3)}.yboard-body{padding:14px;background:var(--sf);display:none;overflow-x:auto}.yboard-body.open{display:block}
.mkt-bar{position:relative;height:6px;background:var(--sf3);border-radius:3px;margin:8px 0 3px}.mkt-dot{position:absolute;top:-4px;width:14px;height:14px;border-radius:50%;border:2px solid var(--sf);box-shadow:0 1px 3px rgba(0,0,0,.2);transform:translateX(-50%)}.mkt-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--tx3)}
.econ{display:flex;gap:1px;background:var(--bd2);border-radius:10px;overflow:hidden;margin:10px 0}.econ-item{flex:1;padding:10px;text-align:center;background:var(--sf)}.econ-label{font-size:8px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--tx3);margin-bottom:3px}.econ-val{font-family:'Instrument Serif',serif;font-size:20px;line-height:1}.econ-sub{font-size:9px;color:var(--tx3);margin-top:2px}
.talent-bar{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--sf2);border-radius:8px;margin:8px 0;font-size:10px;color:var(--tx2)}.talent-bar .tier{font-weight:600;color:var(--tc)}
.pl-wrap{overflow-x:auto;margin:0 -4px;padding:0 4px}
@media(max-width:900px){.kpi-strip{flex-wrap:wrap}.kpi{min-width:33%}.g2{grid-template-columns:1fr}.econ{flex-wrap:wrap}.econ-item{min-width:48%}}
</style></head><body>
<div class="page" id="app"></div>
<script src="app.js"></script>
</body></html>
