name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    name: tests · node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # node:test is stable since 20; we test 20 + 22 (current LTS).
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      # v2 ships with zero npm dependencies — nothing to install.
      - name: Show versions
        run: node --version && npm --version

      - name: Run tests
        run: npm run test:ci
