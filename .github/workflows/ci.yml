name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:ci

      - name: Upload coverage
        if: matrix.node-version == 22
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for merge conflict markers
        run: |
          if grep -rn '<<<<<<< \|>>>>>>> \|=======' --include='*.js' --include='*.html' --include='*.css' .; then
            echo "::error::Merge conflict markers found in source files"
            exit 1
          fi

      - name: Check for console.log in production code
        run: |
          if grep -rn 'console\.log' --include='*.js' . --exclude-dir=node_modules --exclude-dir=tests --exclude-dir=archive; then
            echo "::warning::console.log found in production code"
          fi
