name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:ci

      - name: Upload coverage
        if: matrix.node-version == 22
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  lint-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check test coverage thresholds
        run: |
          npx jest --ci --coverage --coverageReporters=json-summary 2>/dev/null
          node -e "
            const cov = require('./coverage/coverage-summary.json');
            const total = cov.total;
            const stmts = total.statements.pct;
            const branches = total.branches.pct;
            const funcs = total.functions.pct;
            const lines = total.lines.pct;
            console.log('Coverage: statements=' + stmts + '% branches=' + branches + '% functions=' + funcs + '% lines=' + lines + '%');
            if (stmts < 40 || branches < 30 || funcs < 40 || lines < 40) {
              console.error('Coverage below minimum thresholds (40% statements, 30% branches, 40% functions, 40% lines)');
              process.exit(1);
            }
            console.log('Coverage thresholds met.');
          "
